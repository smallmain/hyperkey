name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.2.1 or v0.2.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
          else
            RAW_VERSION="${GITHUB_REF_NAME}"
          fi

          VERSION="${RAW_VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Invalid version: $RAW_VERSION" >&2
            exit 1
          fi

          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stamp version from release
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          sed -i '' "s/static let version = \".*\"/static let version = \"$VERSION\"/" Sources/hyperkey/Constants.swift
          plutil -replace CFBundleVersion -string "$VERSION" Info.plist
          plutil -replace CFBundleShortVersionString -string "$VERSION" Info.plist

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64

      - name: Create and sign app bundle
        run: |
          mkdir -p Hyperkey.app/Contents/MacOS Hyperkey.app/Contents/Resources
          cp .build/apple/Products/Release/hyperkey Hyperkey.app/Contents/MacOS/
          cp Info.plist Hyperkey.app/Contents/
          cp AppIcon.icns Hyperkey.app/Contents/Resources/
          cp -R Resources/*.lproj Hyperkey.app/Contents/Resources/
          codesign -f -s - --identifier com.smallmain.hyperkey Hyperkey.app

      - name: Zip app bundle
        run: |
          ditto -c -k --keepParent Hyperkey.app Hyperkey.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.tag }}
          files: Hyperkey.zip
          generate_release_notes: true
